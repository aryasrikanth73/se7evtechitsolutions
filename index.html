<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Se7en Tech IT Solutions | Coming Soon</title>
    <meta name="description" content="Se7en Tech IT Solutions - We are building a bold new experience for the future of recruitment, staffing, HR consulting, and corporate training.">
    <meta name="keywords" content="HR Consultancy, IT Staffing, Recruitment, Talent Acquisition, Corporate Training">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="Se7en Tech IT Solutions | Coming Soon">
    <meta property="og:description" content="A smarter, faster and more inspiring digital experience is on its way.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #2563eb;
            --bg-dark: #070b19;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-main: 'Poppins', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh; /* Strictly 100vh */
            background-color: var(--bg-dark);
            font-family: var(--font-main);
            color: var(--text-main);
            overflow: hidden; /* Prevent scrolling entirely */
            touch-action: none; /* Prevent mobile scroll bounce */
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: radial-gradient(circle at center, #0a1128 0%, #020617 100%);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: floatBlob 20s infinite alternate ease-in-out;
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: linear-gradient(to right, #4facfe, #00f2fe); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 40vw; height: 40vw; background: linear-gradient(to right, #2563eb, #8b5cf6); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 30vw; height: 30vw; background: linear-gradient(to right, #0ea5e9, #38bdf8); opacity: 0.3; animation: floatBlob 25s infinite alternate-reverse ease-in-out; }

        @keyframes floatBlob {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(10%, 15%) scale(1.1); }
            66% { transform: translate(-10%, -10%) scale(0.9); }
            100% { transform: translate(5%, -15%) scale(1.2); }
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; transform: translateY(90vh) scale(1); }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(0.5); opacity: 0; }
        }

        .main-wrapper {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem; /* Reduced padding */
            box-sizing: border-box;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 2rem 1.5rem; /* Reduced padding */
            max-width: 900px;
            width: 100%;
            max-height: 95vh; /* Ensure it doesn't overflow screen */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards 0.2s;
        }

        .brand-logo {
            width: clamp(140px, 15vw, 180px); /* Scalable logo */
            height: auto;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards 0.3s;
            border-radius: 20px;
        }

        .badge-pulse {
            display: inline-block;
            background: rgba(0, 242, 254, 0.1);
            color: var(--primary);
            border: 1px solid rgba(0, 242, 254, 0.3);
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.8rem;
            position: relative;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 242, 254, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 242, 254, 0); }
        }

        .main-title {
            font-size: clamp(2rem, 6vw, 4rem); /* Responsive fluid font */
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 0.2rem;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 50%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -1px;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards 0.5s;
        }

        .sub-title {
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 500;
            color: #e2e8f0;
            margin-bottom: 1rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards 0.7s;
        }

        .quote-text {
            max-width: 650px;
            text-align: center;
            color: var(--text-muted);
            font-size: clamp(0.85rem, 2vw, 1rem);
            line-height: 1.5;
            font-weight: 300;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.8s ease-out forwards 0.9s;
        }

        .wip-container {
            position: relative;
            width: 140px; /* Reduced size */
            height: 140px;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards 1.1s;
        }

        .center-node {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            z-index: 2;
        }

        .orbit-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            animation: spin 12s linear infinite;
        }

        .node-path {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            transform: translate(-50%, -50%);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .orbit-node {
            position: absolute;
            width: 34px;
            height: 34px;
            background: var(--bg-dark);
            border: 2px solid var(--secondary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-size: 0.9rem;
            animation: counter-spin 12s linear infinite;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.3);
        }

        /* Adjusted positioning for smaller orbit */
        .node-1 { top: -17px; left: calc(50% - 17px); }
        .node-2 { bottom: 12px; right: -5px; }
        .node-3 { bottom: 12px; left: -5px; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes counter-spin { 100% { transform: rotate(-360deg); } }

        .progress-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out forwards 1.3s;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .custom-progress {
            height: 4px; /* Thinner */
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .custom-progress-bar {
            height: 100%;
            width: 78%;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .footer-section {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 1.8rem;
            width: 100%;
            margin-top: 0.5rem;
            opacity: 0;
            animation: fadeUp 1s ease-out forwards 1.5s;
        }

        .icon-link {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-decoration: none;
        }
        
        .icon-link i {
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0; /* Ensures the font-icon is perfectly vertically centered */
        }

        .icon-link:hover {
            color: #fff;
            background: rgba(0, 242, 254, 0.1);
            border-color: rgba(0, 242, 254, 0.3);
            transform: translateY(-2px);
        }

        .icon-link::before {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            font-size: 0.7rem;
            background: var(--bg-dark);
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            white-space: nowrap;
            border: 1px solid var(--glass-border);
            z-index: 20;
        }

        .icon-link:hover::before {
            opacity: 1;
            bottom: -25px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ultra small devices (like iPhone SE landscape or tiny heights) */
        @media (max-height: 600px) {
            .glass-panel { padding: 1rem; justify-content: space-evenly; }
            .brand-logo { width: 110px; margin-bottom: 0.5rem; }
            .badge-pulse { margin-bottom: 0.3rem; font-size: 0.65rem; }
            .main-title { font-size: 1.8rem; margin-bottom: 0; }
            .sub-title { font-size: 0.9rem; margin-bottom: 0.5rem; }
            .quote-text { font-size: 0.75rem; margin-bottom: 0.5rem; display: none; /* Hide quote completely to save space */ }
            .wip-container { width: 100px; height: 100px; margin-bottom: 0.5rem; }
            .center-node { width: 35px; height: 35px; font-size: 0.9rem; }
            .orbit-node { width: 26px; height: 26px; font-size: 0.7rem; }
            .node-1 { top: -13px; left: calc(50% - 13px); }
            .node-2 { bottom: 5px; right: -5px; }
            .node-3 { bottom: 5px; left: -5px; }
            .progress-container { margin-bottom: 0.5rem; }
            .footer-section { gap: 1rem; width: 100%; justify-content: center; }
            .icon-link { width: 36px; height: 36px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-particles">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="main-wrapper">
        
        <div class="glass-panel text-center">
            
            <img src="https://media.licdn.com/dms/image/v2/D560BAQGFZW56Nv2-vw/company-logo_200_200/company-logo_200_200/0/1692357772356/se7en_tech_it_solutions_logo?e=1785369600&v=beta&t=HS1uRzHWTm3BDbE_eo4iaDkOd5lAOBz_K5bIKB8el3s" alt="Se7en Tech IT Solutions" class="brand-logo" onerror="this.outerHTML='<div class=\'brand-logo d-flex align-items-center justify-content-center\' style=\'color: #fff; font-weight: 800; font-size: 1.4rem;\'><i class=\'bi bi-hexagon-fill text-primary me-2\'></i> Se7en Tech IT Solutions</div>'">

            <span class="badge-pulse">New Experience Coming</span>
            
            <h1 class="main-title">Coming Soon</h1>
            <h2 class="sub-title">We're Back with a Bold New Experience.</h2>
            
            <!-- Reduced text payload to ensure it fits -->
            <p class="quote-text">
                A smarter, faster digital experience is on its way.<br>
                Crafting excellence for the future of recruitment and corporate training.
            </p>

            <div class="wip-container">
                <div class="node-path"></div>
                <div class="center-node">
                    <i class="bi bi-buildings"></i>
                </div>
                <div class="orbit-wrapper">
                    <div class="orbit-node node-1" title="Recruitment"><i class="bi bi-person-bounding-box"></i></div>
                    <div class="orbit-node node-2" title="IT Staffing"><i class="bi bi-briefcase"></i></div>
                    <div class="orbit-node node-3" title="Corporate Training"><i class="bi bi-mortarboard"></i></div>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-label">
                    <span>Building the Future...</span>
                    <span id="progress-val">78%</span>
                </div>
                <div class="custom-progress">
                    <div class="custom-progress-bar" id="p-bar-inner"></div>
                </div>
            </div>

            <div class="footer-section">
                <a href="tel:9989874934" class="icon-link" data-tooltip="76800 43177">
                    <i class="bi bi-telephone"></i>
                </a>
                <a href="mailto:info@se7entechitsolutions.com" class="icon-link" data-tooltip="info@se7entechitsolutions.com">
                    <i class="bi bi-envelope"></i>
                </a>
                <a href="https://maps.google.com/?q=4-7-154/2/E/6, Attapur, Sai Hills Colony, Panduranga Nagar, Hyderabad, Telangana 500048" target="_blank" class="icon-link" data-tooltip="4-7-154/2/E/6, Attapur, Hyderabad">
                    <i class="bi bi-geo-alt"></i>
                </a>
                <a href="https://in.linkedin.com/company/se7en-tech-it-solutions" target="_blank" class="icon-link" data-tooltip="LinkedIn">
                    <i class="bi bi-linkedin"></i>
                </a>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Progress Bar Animation Logic
            const percentages = [78, 81, 84, 88, 92, 95];
            let pIndex = 0;
            const progressVal = document.getElementById('progress-val');
            const progressBar = document.getElementById('p-bar-inner');

            progressVal.innerText = percentages[pIndex] + '%';
            progressBar.style.width = percentages[pIndex] + '%';

            setInterval(() => {
                pIndex = (pIndex + 1) % percentages.length;
                const val = percentages[pIndex];
                
                progressVal.style.opacity = 0;
                setTimeout(() => {
                    progressVal.innerText = val + '%';
                    progressBar.style.width = val + '%';
                    progressVal.style.opacity = 1;
                }, 300);
            }, 2500); 

            // Floating Particles Generator (Reduced count for performance and visual clarity on small screens)
            const bgContainer = document.getElementById('bg-particles');
            const particleCount = 15; 

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 3 + 1; 
                const posX = Math.random() * 100; 
                const duration = Math.random() * 15 + 10;
                const delay = Math.random() * 10;
                
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}vw`;
                particle.style.animationDuration = `${duration}s`;
                particle.style.animationDelay = `${delay}s`;
                
                bgContainer.appendChild(particle);
            }
        });
    </script>
</body>
</html>
